<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أ/ محمد أشرف قاسم</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.2/css/all.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>

    <style>
        :root {
            --crimson:     #8B0000;
            --crimson-mid: #a32323;
            --crimson-glow:#c0392b;
            --gold:        #c9a84c;
            --gold-light:  #e8d08a;
            --ink:         #1a0a0a;
            --paper:       #fdf6ee;
            --paper-warm:  #f5ebe0;
            --muted:       #7a6060;
            --white:       #ffffff;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--ink);
            color: var(--paper);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── Molecule SVG Background ── */
        .bg-molecules {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            opacity: 0.04;
            background-image:
                radial-gradient(circle 1px at 20% 30%, var(--gold) 1px, transparent 0),
                radial-gradient(circle 1px at 50% 10%, var(--gold) 1px, transparent 0),
                radial-gradient(circle 1px at 80% 25%, var(--gold) 1px, transparent 0),
                radial-gradient(circle 1px at 35% 60%, var(--gold) 1px, transparent 0),
                radial-gradient(circle 1px at 65% 75%, var(--gold) 1px, transparent 0),
                radial-gradient(circle 1px at 10% 80%, var(--gold) 1px, transparent 0),
                radial-gradient(circle 1px at 90% 55%, var(--gold) 1px, transparent 0);
        }

        /* ── Hero ── */
        .hero {
            position: relative;
            z-index: 1;
            background: linear-gradient(160deg, #1a0a0a 0%, #2d0a0a 50%, #1a0505 100%);
            padding: 60px 24px 48px;
            text-align: center;
            border-bottom: 1px solid rgba(201,168,76,0.25);
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -60px; left: 50%;
            transform: translateX(-50%);
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(163,35,35,0.35) 0%, transparent 65%);
            pointer-events: none;
        }

        .hero-eyebrow {
            display: inline-block;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 3px;
            color: var(--gold);
            text-transform: uppercase;
            border: 1px solid rgba(201,168,76,0.4);
            border-radius: 2px;
            padding: 5px 14px;
            margin-bottom: 28px;
        }

        .hero-name {
            font-size: clamp(2.6rem, 8vw, 5rem);
            font-weight: 900;
            line-height: 1.05;
            color: var(--white);
            text-shadow: 0 2px 40px rgba(163,35,35,0.6);
            margin-bottom: 10px;
        }

        .hero-name span {
            color: var(--gold);
        }

        .hero-title {
            font-size: clamp(1rem, 3vw, 1.3rem);
            font-weight: 300;
            color: rgba(253,246,238,0.75);
            line-height: 1.8;
            max-width: 500px;
            margin: 0 auto 32px;
        }

        .hero-divider {
            width: 60px;
            height: 2px;
            background: linear-gradient(to right, transparent, var(--gold), transparent);
            margin: 0 auto 0;
        }

        /* ── Subject pills ── */
        .subjects {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 30px;
        }

        .subject-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(201,168,76,0.08);
            border: 1px solid rgba(201,168,76,0.3);
            color: var(--gold-light);
            font-size: 13px;
            font-weight: 500;
            padding: 6px 16px;
            border-radius: 100px;
        }

        .subject-pill i { font-size: 11px; color: var(--gold); }

        /* ── Cards ── */
        .cards-section {
            position: relative;
            z-index: 1;
            max-width: 800px;
            margin: 0 auto;
            padding: 48px 20px 60px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 600px) {
            .cards-section { grid-template-columns: 1fr; }
        }

        .card {
            background: linear-gradient(145deg, #1f0d0d, #2a1010);
            border: 1px solid rgba(201,168,76,0.15);
            border-radius: 16px;
            padding: 28px 24px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .card::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 16px;
            background: linear-gradient(135deg, rgba(201,168,76,0.04), transparent 60%);
            pointer-events: none;
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: rgba(201,168,76,0.45);
            box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(201,168,76,0.1);
        }

        .card-icon-wrap {
            width: 52px; height: 52px;
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px;
        }

        .card-icon-wrap.fb   { background: rgba(59,89,152,0.2); color: #6e9bdb; border: 1px solid rgba(59,89,152,0.4); }
        .card-icon-wrap.wa   { background: rgba(37,211,102,0.12); color: #4ee87a; border: 1px solid rgba(37,211,102,0.3); }

        .card-label {
            font-size: 18px;
            font-weight: 700;
            color: var(--paper);
        }

        .card-sublabel {
            font-size: 12px;
            color: var(--muted);
            margin-top: -12px;
        }

        /* ── QR Code ── */
        .qr-wrap {
            background: var(--white);
            border-radius: 10px;
            padding: 8px;
            line-height: 0;
        }

        .qr-wrap img, .qr-wrap canvas {
            border-radius: 6px;
            display: block;
        }

        /* ── CTA Button ── */
        .cta-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 12px 20px;
            border-radius: 10px;
            font-family: 'Tajawal', sans-serif;
            font-size: 15px;
            font-weight: 700;
            text-decoration: none;
            border: none;
            cursor: pointer;
            transition: filter 0.2s ease, transform 0.2s ease;
            letter-spacing: 0.3px;
        }

        .cta-btn:hover { filter: brightness(1.15); transform: scale(1.02); }
        .cta-btn:active { transform: scale(0.98); }

        .cta-btn.fb {
            background: linear-gradient(135deg, #3b5998, #4f76c5);
            color: #fff;
        }

        .cta-btn.wa {
            background: linear-gradient(135deg, #128C7E, #25d366);
            color: #fff;
        }

        /* ── Footer ── */
        footer {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 24px 16px 36px;
            border-top: 1px solid rgba(201,168,76,0.1);
            color: rgba(253,246,238,0.3);
            font-size: 12px;
            font-weight: 300;
            letter-spacing: 1px;
        }

        /* ── Reduced motion ── */
        @media (prefers-reduced-motion: reduce) {
            .card { transition: none; }
        }
    </style>
</head>
<body>

    <div class="bg-molecules"></div>

    <header class="hero">
        <div class="hero-eyebrow">بطاقة التواصل</div>
        <h1 class="hero-name">أ/ محمد أشرف <span>قاسم</span></h1>
        <p class="hero-title">
            أستاذ الكيمياء للمرحلة الثانوية<br>
            والعلوم للمرحلة الإعدادية
        </p>
        <div class="hero-divider"></div>
        <div class="subjects">
            <span class="subject-pill"><i class="fas fa-flask"></i> كيمياء عام</span>
            <span class="subject-pill"><i class="fas fa-language"></i> كيمياء لغات</span>
            <span class="subject-pill"><i class="fas fa-atom"></i> علوم إعدادي</span>
        </div>
    </header>

    <main class="cards-section">

        <!-- Facebook -->
        <div class="card">
            <div class="card-icon-wrap fb">
                <i class="fab fa-facebook-f"></i>
            </div>
            <div class="card-label">فيس بوك</div>
            <div class="card-sublabel">Facebook</div>
            <div class="qr-wrap">
                <div id="qr-fb"></div>
            </div>
            <a href="https://www.facebook.com/share/1DKNWQ6uDV" target="_blank" class="cta-btn fb">
                <i class="fab fa-facebook-f"></i>
                زيارة الصفحة
            </a>
        </div>

        <!-- WhatsApp -->
        <div class="card">
            <div class="card-icon-wrap wa">
                <i class="fab fa-whatsapp"></i>
            </div>
            <div class="card-label">واتس أب</div>
            <div class="card-sublabel">WhatsApp</div>
            <div class="qr-wrap">
                <div id="qr-wa"></div>
            </div>
            <a href="https://wa.me/qr/RCJU4WFFXQJWG1" target="_blank" class="cta-btn wa">
                <i class="fab fa-whatsapp"></i>
                ارسل رسالة
            </a>
        </div>

    </main>

    <footer>محمد أشرف قاسم &nbsp;·&nbsp; بطاقة التواصل</footer>

    <script>
        const qrOpts = { width: 140, height: 140, colorDark: '#1a0a0a', colorLight: '#ffffff', correctLevel: QRCode.CorrectLevel.H };
        new QRCode(document.getElementById('qr-fb'), Object.assign({ text: 'https://www.facebook.com/share/1DKNWQ6uDV' }, qrOpts));
        new QRCode(document.getElementById('qr-wa'), Object.assign({ text: 'https://wa.me/qr/RCJU4WFFXQJWG1' }, qrOpts));
    </script>
</body>
</html>
